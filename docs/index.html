<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLEnder Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="scene">
    <img id="bg" src="assets/mission-control-bg.png" alt="Mission Control">

    <!-- Upper screen overlays -->
    <a id="counter-sweeps" class="counter-panel counter-small" href="https://github.com/mozilla/blender/actions/workflows/scheduled-sweep.yml?query=is%3Asuccess" target="_blank" rel="noopener">
      <div class="counter-label">SWEEPS</div>
      <div class="counter-value" data-type="sweep">0</div>
    </a>

    <a id="counter-fail-rate" class="counter-panel counter-small counter-bottom" href="https://github.com/mozilla/blender/actions?query=is%3Afailure" target="_blank" rel="noopener">
      <div class="counter-label">FAIL%</div>
      <div class="counter-value counter-fail" data-type="failrate">—</div>
    </a>

    <a id="counter-merges" class="counter-panel counter-large" href="https://github.com/mozilla/blender/actions/workflows/chore-automerge-dependabot-prs.yml?query=is%3Asuccess" target="_blank" rel="noopener">
      <div class="counter-label">MERGES</div>
      <div class="counter-value" data-type="merge">0</div>
    </a>

    <a id="counter-reviews" class="counter-panel counter-small" href="https://github.com/mozilla/blender/actions/workflows/chore-review-major-dependabot-update.yml?query=is%3Asuccess" target="_blank" rel="noopener">
      <div class="counter-label">REVIEWS</div>
      <div class="counter-value" data-type="review">0</div>
    </a>

    <a id="counter-failures" class="counter-panel counter-small counter-bottom" href="https://github.com/mozilla/blender/actions?query=is%3Afailure" target="_blank" rel="noopener">
      <div class="counter-label">FAILED</div>
      <div class="counter-value counter-fail" data-type="fail">0</div>
    </a>

    <a id="counter-fixes" class="counter-panel counter-medium" href="https://github.com/mozilla/blender/actions/workflows/fix-dependabot-pr.yml?query=is%3Asuccess" target="_blank" rel="noopener">
      <div class="counter-label">FIXES</div>
      <div class="counter-value" data-type="fix">0</div>
    </a>

    <!-- Mission clock -->
    <div id="mission-clock">T+ 00:00:00</div>

    <!-- Desk slots -->
    <div class="desk-slot" data-desk="0"></div>
    <div class="desk-slot" data-desk="1"></div>
    <div class="desk-slot" data-desk="2">
      <img id="idle-robot" class="robot active" src="assets/robot.png" alt="BLEnder">
    </div>
    <div class="desk-slot" data-desk="3"></div>
    <div class="desk-slot" data-desk="4"></div>

    <!-- Beam animation layer -->
    <div id="beam-layer"></div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-text">Connecting...</span>
      <span id="status-time"></span>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
