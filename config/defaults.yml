# BLEnder default settings.
# Per-repo overrides go in the target repo's .blender/blender.yml.

automerge:
  dry_run: false
  allow_major: false
  review_major: true
  min_compatibility_score: 80
  check_advisories: true

fix:
  dry_run: false
  max_claude_turns: 30
  max_budget_usd: 2.00

investigate:
  enabled: true
  dry_run: false
  max_claude_turns: 20
  max_budget_usd: 1.50
  run_tests: true
  severity_threshold: ""
  dismiss_not_affected: false
