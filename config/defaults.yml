# BLEnder default settings.
# Per-repo overrides go in the target repo's .blender/blender.yml.

automerge:
  dry_run: false
  allow_major: false
  review_major: true
  min_compatibility_score: 70
  check_advisories: true

fix:
  dry_run: false
  max_claude_turns: 30
  max_budget_usd: 2.00
  max_fix_attempts: 3

investigate:
  enabled: true
  dry_run: false
  max_claude_turns: 20
  max_budget_usd: 1.50
  severity_threshold: ""
  dismiss_unaffected: false

auto_engineer:
  enabled: false
  dry_run: true
  issue_label: "auto-engineer"
  trusted_author_associations: "OWNER"
  forbidden_paths: ".github/ .env .circleci/"
  max_plan_turns: 20
  max_plan_budget_usd: 1.50
  max_implement_turns: 40
  max_implement_budget_usd: 4.00
  max_self_review_turns: 15
  max_self_review_budget_usd: 1.00
