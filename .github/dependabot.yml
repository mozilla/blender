version: 2
updates:
  # Node tooling — the pinned Claude Code CLI in package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python deps — pyproject.toml and the mirrored scripts/requirements.txt
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/scripts"
    schedule:
      interval: "weekly"

  # Pinned action SHAs in the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
