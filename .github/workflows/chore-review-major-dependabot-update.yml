---
name: BLEnder Review Major Bump
run-name: "Review ${{ inputs.target_repo }} PR #${{ inputs.pr_number }} major update to ${{ inputs.dep_name }} ${{ inputs.new_version }}"
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g. mozilla/blurts-server)'
        required: true
      pr_number:
        description: 'PR number to review'
        required: true
      dep_name:
        description: 'Dependency name (e.g. python-ipware)'
        default: ''
      new_version:
        description: 'New major version (e.g. 7.0.0)'
        default: ''
      dry_run:
        description: 'Dry run (true = no approve/merge)'
        default: 'true'
      verbose:
        description: 'Print full Claude output'
        default: 'false'
      submodules:
        description: 'Check out submodules (true = recursive)'
        default: 'false'

permissions:
  contents: read

concurrency:
  group: blender-major-${{ inputs.target_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Parse target repo
        id: parse
        run: |
          echo "owner=${TARGET_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${TARGET_REPO##*/}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_REPO: ${{ inputs.target_repo }}

      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse.outputs.owner }}
          repositories: ${{ steps.parse.outputs.name }}
          permission-contents: read
          permission-pull-requests: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target
          submodules: ${{ inputs.submodules == 'true' && 'recursive' || 'false' }}
          persist-credentials: false

      - name: Read repo config
        id: config
        run: |
          CONFIG_FILE="target/.blender/blender.yml"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: No config found at $CONFIG_FILE"
            echo "Run the setup workflow first to onboard this repo."
            exit 1
          fi
          {
            echo "node_version=$(yq '.node_version // ""' "$CONFIG_FILE")"
            echo "python_version=$(yq '.python_version // ""' "$CONFIG_FILE")"
            echo "install_command=$(yq '.install_command // ""' "$CONFIG_FILE")"
            echo "repo_name=$(yq '.repo_name // ""' "$CONFIG_FILE")"
          } >> "$GITHUB_OUTPUT"

      - name: Save BLEnder config from default branch
        run: cp -r target/.blender /tmp/blender-config

      - name: Checkout PR branch
        working-directory: target
        run: gh pr checkout "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Restore BLEnder config
        run: cp -r /tmp/blender-config/. target/.blender/

      - name: Comment on PR
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "BLEnder is reviewing this major version bump. [Workflow run](${RUN_URL})"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # --- Conditional setup ---
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ steps.config.outputs.python_version || '3.11' }}
          cache: pip

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        if: steps.config.outputs.node_version != ''
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Install dependencies
        if: steps.config.outputs.install_command != ''
        working-directory: target
        run: |
          eval "$INSTALL_COMMAND"
        env:
          INSTALL_COMMAND: ${{ steps.config.outputs.install_command }}

      # --- Parse PR metadata for gather-context ---
      - name: Parse PR metadata
        id: pr-meta
        working-directory: target
        run: |
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')

          # Extract dep name, old version, new version from PR title
          # "Bump python-ipware from 6.0.5 to 7.0.0"
          DEP_NAME=$(echo "$PR_TITLE" | sed -n 's/.*[Bb]ump \(.*\) from .*/\1/p')
          OLD_VERSION=$(echo "$PR_TITLE" | sed -n 's/.*from \([^ ]*\) to .*/\1/p')
          NEW_VERSION=$(echo "$PR_TITLE" | sed -n 's/.*to \([^ ]*\)/\1/p')

          # Ecosystem from branch name
          BRANCH=$(echo "$PR_JSON" | jq -r '.head.ref')
          ECOSYSTEM=$(echo "$BRANCH" | cut -d/ -f2)

          {
            echo "dep_name=${DEP_NAME}"
            echo "old_version=${OLD_VERSION}"
            echo "new_version=${NEW_VERSION}"
            echo "ecosystem=${ECOSYSTEM}"
          } >> "$GITHUB_OUTPUT"

          echo "Dependency: ${DEP_NAME} ${OLD_VERSION} -> ${NEW_VERSION} (${ECOSYSTEM})"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}

      # --- BLEnder review ---
      - name: Install sandbox dependencies
        run: sudo apt-get install -y bubblewrap socat

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@stable

      - name: Gather PR context
        working-directory: target
        run: ${{ github.workspace }}/scripts/gather-context.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          PROMPT_TEMPLATE: ${{ github.workspace }}/prompts/major-bump-prompt.md
          DEP_NAME: ${{ steps.pr-meta.outputs.dep_name }}
          OLD_VERSION: ${{ steps.pr-meta.outputs.old_version }}
          NEW_VERSION: ${{ steps.pr-meta.outputs.new_version }}
          ECOSYSTEM: ${{ steps.pr-meta.outputs.ecosystem }}

      - name: Run Claude review
        working-directory: target
        run: ${{ github.workspace }}/scripts/run-claude.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ inputs.target_repo }}
          REPO_NAME: ${{ steps.config.outputs.repo_name }}
          BLENDER_DIR: ${{ github.workspace }}
          BLENDER_MODE: major
          CLAUDE_VERBOSE: ${{ inputs.verbose }}

      - name: Post review results
        working-directory: target
        run: python ${{ github.workspace }}/scripts/post_major_review.py
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          DRY_RUN: ${{ inputs.dry_run }}
