---
name: BLEnder Auto-merge Dependabot
run-name: "Auto-merge ${{ inputs.target_repo }}"
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g. mozilla/blurts-server)'
        required: true
      dry_run:
        description: 'Dry run (true = no merge)'
        default: 'true'

permissions:
  contents: read
  actions: write

concurrency:
  group: blender-automerge-${{ inputs.target_repo }}
  cancel-in-progress: false

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Parse target repo
        id: parse
        run: |
          echo "owner=${TARGET_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${TARGET_REPO##*/}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_REPO: ${{ inputs.target_repo }}

      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse.outputs.owner }}
          repositories: ${{ steps.parse.outputs.name }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch repo config
        id: fetch-config
        run: |
          mkdir -p target/.blender
          gh api "repos/${TARGET_REPO}/contents/.blender/blender.yml" \
            --jq '.content' | base64 -d > target/.blender/blender.yml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
        continue-on-error: true

      - name: Load config
        id: blender-config
        run: python scripts/load-config.py --defaults config/defaults.yml --repo-config target/.blender/blender.yml
        continue-on-error: true

      - name: Run auto-merge
        id: run-automerge
        run: python scripts/automerge_dependabot.py
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.target_repo }}
          DRY_RUN: ${{ inputs.dry_run || steps.blender-config.outputs.automerge_dry_run || 'false' }}
          MIN_COMPAT_SCORE: ${{ steps.blender-config.outputs.automerge_min_compatibility_score || '80' }}
          ALLOW_MAJOR: ${{ steps.blender-config.outputs.automerge_allow_major || 'false' }}
          REVIEW_MAJOR: ${{ steps.blender-config.outputs.automerge_review_major || 'true' }}

      - name: Dispatch major-bump reviews
        if: steps.run-automerge.outputs.major_bumps != ''
        run: |
          echo "$MAJOR_BUMPS" | jq -c '.[]' | while read -r bump; do
            pr_number=$(echo "$bump" | jq -r '.pr_number')
            echo "Dispatching review for PR #${pr_number}..."
            gh workflow run fix-major-bump.yml \
              --field target_repo="$TARGET_REPO" \
              --field pr_number="$pr_number" \
              --field dry_run="${DRY_RUN}"
          done
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          MAJOR_BUMPS: ${{ steps.run-automerge.outputs.major_bumps }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
