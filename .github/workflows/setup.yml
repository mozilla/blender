name: BLEnder Setup
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Repo to set up (e.g. mozilla/blurts-server)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.target_repo }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target
          submodules: recursive
          persist-credentials: false

      - name: Install sandbox dependencies
        run: sudo apt-get install -y bubblewrap socat

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@stable

      - name: Run BLEnder setup
        working-directory: target
        run: ${{ github.workspace }}/scripts/setup.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ inputs.target_repo }}

      - name: Open PR
        working-directory: target
        run: |
          git checkout -b add-blender
          git add .github/blender/ .github/workflows/blender-*
          git commit -m "Add BLEnder automated dependabot CI fix"
          gh pr create \
            --title "Add BLEnder automated dependabot CI fix" \
            --body "$(cat <<'EOF'
          Generated by BLEnder setup.

          Review the prompt template and caller workflows, then add `ANTHROPIC_API_KEY` to repo secrets.

          ## Files added

          - `.github/blender/fix-dependabot-prompt.md` -- repo-specific fix patterns
          - `.github/workflows/blender-fix-dependabot-pr.yml` -- caller for CI fix
          - `.github/workflows/blender-automerge-dependabot.yml` -- caller for auto-merge
          EOF
          )"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
