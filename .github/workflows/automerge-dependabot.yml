---
name: BLEnder Auto-merge Dependabot
on:
  workflow_call:
    inputs:
      dry_run:
        type: string
        default: 'true'
      blender_local:
        type: string
        default: 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: blender-automerge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Checkout blender scripts
        if: inputs.blender_local != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: mozilla/blender
          path: .blender
          persist-credentials: false
          sparse-checkout: scripts

      - name: Use local blender scripts
        if: inputs.blender_local == 'true'
        run: ln -s "${{ github.workspace }}" .blender

      - name: Install Python dependencies
        run: pip install -r .blender/scripts/requirements.txt

      - name: Run auto-merge
        run: python .blender/scripts/automerge-dependabot.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
