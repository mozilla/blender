---
name: BLEnder Fix Dependabot PR
run-name: "Fix ${{ inputs.target_repo }} PR #${{ inputs.pr_number }}"
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g. mozilla/blurts-server)'
        required: true
      pr_number:
        description: 'PR number to fix'
        required: true
      dry_run:
        description: 'Dry run (true = no commit)'
        default: 'true'
      verbose:
        description: 'Print full Claude output'
        default: 'false'
      submodules:
        description: 'Check out submodules (true = recursive)'
        default: 'false'

permissions:
  contents: read
  actions: write

concurrency:
  group: blender-fix-${{ inputs.target_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false

      - name: Setup target repo
        id: setup
        uses: ./.github/actions/setup-target
        with:
          target-repo: ${{ inputs.target_repo }}
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          blender-workspace: ${{ github.workspace }}
          permission-contents: write
          permission-pull-requests: write
          checkout-submodules: ${{ inputs.submodules == 'true' && 'recursive' || 'false' }}
          install-sandbox: 'true'
          install-claude: 'true'

      - name: Save BLEnder config from default branch
        run: cp -r target/.blender /tmp/blender-config

      - name: Checkout PR branch
        working-directory: target
        run: gh pr checkout "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ steps.setup.outputs.token }}

      - name: Restore BLEnder config
        run: cp -r /tmp/blender-config/. target/.blender/

      # --- BLEnder fix ---
      - name: Gather PR context
        id: gather
        working-directory: target
        run: python3 ${{ github.workspace }}/scripts/gather_context.py
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          PROMPT_TEMPLATE: ${{ github.workspace }}/prompts/fix-ci-prompt.md
          INSTALL_FAILED: ${{ steps.setup.outputs.install_failed }}
          INSTALL_LOG_FILE: /tmp/install-output.log

      - name: Upload gathered context
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: blender-context
          path: target/.blender-context/
          retention-days: 14

      - name: Warn about CircleCI
        if: steps.gather.outputs.HAS_CIRCLECI_FAILURE == 'true'
        working-directory: target
        run: |
          BODY=$(cat <<'COMMENT'
          > **Note:** This PR has failing CircleCI checks.
          > BLEnder cannot access CircleCI log output, so it
          > may not be able to diagnose or fix the failure.
          > Consider migrating CI to GitHub Actions so BLEnder
          > can read failure logs directly.
          COMMENT
          )
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}

      - name: Comment on PR
        working-directory: target
        run: |
          gh pr comment "$PR_NUMBER" --body "BLEnder picked up this PR. [Workflow run](${RUN_URL})"
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Run Claude fix
        working-directory: target
        run: ${{ github.workspace }}/scripts/run-claude.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ inputs.target_repo }}
          REPO_NAME: ${{ steps.setup.outputs.repo_name }}
          BLENDER_DIR: ${{ github.workspace }}
          CLAUDE_VERBOSE: ${{ inputs.verbose }}

      # --- Commit (separate step, Claude is dead) ---
      - name: Commit and push fix
        id: commit
        if: inputs.dry_run != 'true'
        working-directory: target
        run: ${{ github.workspace }}/scripts/commit.sh
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          REPO: ${{ inputs.target_repo }}

      - name: Parse PR title
        id: pr-meta
        if: >-
          inputs.dry_run != 'true'
          && steps.commit.outputs.pushed == 'true'
        run: |
          PR_TITLE=$(gh api "repos/${TARGET_REPO}/pulls/${PR_NUMBER}" --jq '.title')
          export PR_TITLE
          ${{ github.workspace }}/scripts/parse-pr-title.sh
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}

      - name: Dispatch major-bump review
        if: >-
          inputs.dry_run != 'true'
          && steps.commit.outputs.pushed == 'true'
          && steps.pr-meta.outputs.old_version != ''
          && steps.pr-meta.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          DEP_NAME: ${{ steps.pr-meta.outputs.dep_name }}
          OLD_VERSION: ${{ steps.pr-meta.outputs.old_version }}
          NEW_VERSION: ${{ steps.pr-meta.outputs.new_version }}
        run: |
          OLD_MAJOR="${OLD_VERSION%%.*}"
          NEW_MAJOR="${NEW_VERSION%%.*}"

          if [ "$OLD_MAJOR" = "$NEW_MAJOR" ]; then
            echo "Not a major bump (${OLD_VERSION} -> ${NEW_VERSION}). Skipping."
            exit 0
          fi

          echo "Major bump detected: ${DEP_NAME} ${OLD_VERSION} -> ${NEW_VERSION}"
          gh workflow run chore-review-major-dependabot-update.yml \
            --ref "$REF" \
            --raw-field target_repo="$TARGET_REPO" \
            --raw-field pr_number="$PR_NUMBER" \
            --raw-field dep_name="$DEP_NAME" \
            --raw-field new_version="$NEW_VERSION" \
            --raw-field dry_run="false"

      - name: Comment if fix failed
        if: >-
          always()
          && inputs.dry_run != 'true'
          && steps.commit.outputs.pushed != 'true'
        working-directory: target
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "BLEnder could not fix this PR automatically. [Workflow run](${RUN_URL})"
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
