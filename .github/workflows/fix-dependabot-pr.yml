---
name: BLEnder Fix Dependabot PR
run-name: "Fix ${{ inputs.target_repo }} PR #${{ inputs.pr_number }}"
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g. mozilla/blurts-server)'
        required: true
      pr_number:
        description: 'PR number to fix'
        required: true
      dry_run:
        description: 'Dry run (true = no commit)'
        default: 'true'
      verbose:
        description: 'Print full Claude output'
        default: 'false'
      submodules:
        description: 'Check out submodules (true = recursive)'
        default: 'false'

permissions:
  contents: read
  actions: write

concurrency:
  group: blender-fix-${{ inputs.target_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Parse target repo
        id: parse
        run: |
          echo "owner=${TARGET_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${TARGET_REPO##*/}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_REPO: ${{ inputs.target_repo }}

      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse.outputs.owner }}
          repositories: ${{ steps.parse.outputs.name }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target
          submodules: ${{ inputs.submodules == 'true' && 'recursive' || 'false' }}
          persist-credentials: false

      - name: Read repo config
        id: config
        run: |
          CONFIG_FILE="target/.blender/blender.yml"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: No config found at $CONFIG_FILE"
            echo "Run the setup workflow first to onboard this repo."
            exit 1
          fi
          {
            echo "node_version=$(yq '.node_version // ""' "$CONFIG_FILE")"
            echo "python_version=$(yq '.python_version // ""' "$CONFIG_FILE")"
            echo "install_command=$(yq '.install_command // ""' "$CONFIG_FILE")"
            echo "repo_name=$(yq '.repo_name // ""' "$CONFIG_FILE")"
          } >> "$GITHUB_OUTPUT"

      - name: Save BLEnder config from default branch
        run: cp -r target/.blender /tmp/blender-config

      - name: Checkout PR branch
        working-directory: target
        run: gh pr checkout "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Restore BLEnder config
        run: cp -r /tmp/blender-config/. target/.blender/

      # --- Conditional setup ---
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ steps.config.outputs.python_version || '3.11' }}
          cache: pip

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        if: steps.config.outputs.node_version != ''
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Install dependencies
        id: install
        if: steps.config.outputs.install_command != ''
        continue-on-error: true
        working-directory: target
        run: |
          eval "$INSTALL_COMMAND" 2>&1 | tee /tmp/install-output.log
        env:
          INSTALL_COMMAND: ${{ steps.config.outputs.install_command }}

      # --- BLEnder fix ---
      - name: Install sandbox dependencies
        run: sudo apt-get install -y bubblewrap socat

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@stable

      - name: Gather PR context
        working-directory: target
        run: ${{ github.workspace }}/scripts/gather-context.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          PROMPT_TEMPLATE: .blender/fix-dependabot-prompt.md
          INSTALL_FAILED: ${{ steps.install.outcome == 'failure' && 'true' || 'false' }}
          INSTALL_LOG_FILE: /tmp/install-output.log

      - name: Comment on PR
        working-directory: target
        run: |
          gh pr comment "$PR_NUMBER" --body "BLEnder picked up this PR. [Workflow run](${RUN_URL})"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Run Claude fix
        working-directory: target
        run: ${{ github.workspace }}/scripts/run-claude.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ inputs.target_repo }}
          REPO_NAME: ${{ steps.config.outputs.repo_name }}
          BLENDER_DIR: ${{ github.workspace }}
          CLAUDE_VERBOSE: ${{ inputs.verbose }}

      # --- Commit (separate step, Claude is dead) ---
      - name: Commit and push fix
        id: commit
        if: inputs.dry_run != 'true'
        working-directory: target
        run: ${{ github.workspace }}/scripts/commit.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.target_repo }}

      - name: Parse PR title
        id: pr-meta
        if: >-
          inputs.dry_run != 'true'
          && steps.commit.outputs.pushed == 'true'
        run: |
          PR_TITLE=$(gh api "repos/${TARGET_REPO}/pulls/${PR_NUMBER}" --jq '.title')
          export PR_TITLE
          ${{ github.workspace }}/scripts/parse-pr-title.sh
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}

      - name: Dispatch major-bump review
        if: >-
          inputs.dry_run != 'true'
          && steps.commit.outputs.pushed == 'true'
          && steps.pr-meta.outputs.old_version != ''
          && steps.pr-meta.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          DEP_NAME: ${{ steps.pr-meta.outputs.dep_name }}
          OLD_VERSION: ${{ steps.pr-meta.outputs.old_version }}
          NEW_VERSION: ${{ steps.pr-meta.outputs.new_version }}
        run: |
          OLD_MAJOR="${OLD_VERSION%%.*}"
          NEW_MAJOR="${NEW_VERSION%%.*}"

          if [ "$OLD_MAJOR" = "$NEW_MAJOR" ]; then
            echo "Not a major bump (${OLD_VERSION} -> ${NEW_VERSION}). Skipping."
            exit 0
          fi

          echo "Major bump detected: ${DEP_NAME} ${OLD_VERSION} -> ${NEW_VERSION}"
          gh workflow run chore-review-major-dependabot-update.yml \
            --ref "$REF" \
            --raw-field target_repo="$TARGET_REPO" \
            --raw-field pr_number="$PR_NUMBER" \
            --raw-field dep_name="$DEP_NAME" \
            --raw-field new_version="$NEW_VERSION" \
            --raw-field dry_run="false"
