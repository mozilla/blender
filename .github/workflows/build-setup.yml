---
name: Update BLEnder Config
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Repo to set up (e.g. mozilla/blurts-server)'
        required: true

permissions: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false

      - name: Parse target repo
        id: parse
        run: |
          echo "owner=${TARGET_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${TARGET_REPO##*/}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_REPO: ${{ inputs.target_repo }}

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse.outputs.owner }}
          repositories: ${{ steps.parse.outputs.name }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target
          submodules: recursive
          persist-credentials: true

      - name: Install sandbox dependencies
        run: sudo apt-get install -y bubblewrap socat

      - name: Install Claude Code
        run: |
          npm ci
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run BLEnder setup
        working-directory: target
        run: ${{ github.workspace }}/scripts/setup.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ inputs.target_repo }}

      - name: Open PR on target repo
        working-directory: target
        run: |
          if [ ! -d ".blender" ]; then
            echo "Error: Setup did not generate config at .blender/"
            exit 1
          fi
          git config user.name "blender[bot]"
          git config user.email "blender[bot]@users.noreply.github.com"

          BRANCH="blender-setup"

          # Handle re-runs: check for existing branch
          BRANCH_EXISTS=false
          if git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH_EXISTS=true
          fi

          if [ "$BRANCH_EXISTS" = "true" ]; then
            echo "Branch $BRANCH already exists on remote. Force-pushing update."
            git checkout -B "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # Stage .blender/ directory
          git add .blender/

          # Stage symlinks (if created)
          [ -L CLAUDE.md ] && git add CLAUDE.md
          [ -L AGENTS.md ] && git add AGENTS.md
          [ -L .github/copilot-instructions.md ] && git add .github/copilot-instructions.md

          # Stage modified existing files (appended reference)
          for f in CLAUDE.md AGENTS.md .github/copilot-instructions.md; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              git add "$f"
            fi
          done

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "feat: add BLEnder config"
          git push --force-with-lease origin "$BRANCH"

          # Check for existing PR (reuse branch-exists result)
          if [ "$BRANCH_EXISTS" = "true" ]; then
            existing_pr=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          else
            existing_pr=""
          fi
          if [ -n "$existing_pr" ]; then
            echo "PR #${existing_pr} already exists. Updated branch."
          else
            gh pr create \
              --title "Add BLEnder config" \
              --body "$(cat <<'EOF'
          Generated by [BLEnder](https://github.com/mozilla/blender) setup.

          Review the config and agent instructions, then merge.

          ## Files added

          - `.blender/blender.yml` — repo-specific settings
          - `.blender/agents.md` — agent instructions (CI commands, repo knowledge)

          ## Symlinks created (where no existing file found)

          $([ -L CLAUDE.md ] && echo "- \`CLAUDE.md\` → \`.blender/agents.md\`")
          $([ -L AGENTS.md ] && echo "- \`AGENTS.md\` → \`.blender/agents.md\`")
          $([ -L .github/copilot-instructions.md ] && echo "- \`.github/copilot-instructions.md\` → \`.blender/agents.md\`")
          EOF
          )"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
