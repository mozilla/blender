---
name: BLEnder Setup
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Repo to set up (e.g. mozilla/blurts-server)'
        required: true

permissions: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Parse target repo
        id: parse
        run: |
          echo "owner=${TARGET_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${TARGET_REPO##*/}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_REPO: ${{ inputs.target_repo }}

      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.BLENDER_APP_ID }}
          private-key: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse.outputs.owner }}
          repositories: ${{ steps.parse.outputs.name }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target
          submodules: recursive
          persist-credentials: true

      - name: Install sandbox dependencies
        run: sudo apt-get install -y bubblewrap socat

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@stable

      - name: Run BLEnder setup
        working-directory: target
        run: ${{ github.workspace }}/scripts/setup.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ inputs.target_repo }}

      - name: Open PR on target repo
        working-directory: target
        run: |
          if [ ! -d ".blender" ]; then
            echo "Error: Setup did not generate config at .blender/"
            exit 1
          fi
          git config user.name "blender[bot]"
          git config user.email "blender[bot]@users.noreply.github.com"
          BRANCH="blender-setup"
          git checkout -b "$BRANCH"
          git add .blender/
          git commit -m "feat: add BLEnder config"
          git push origin "$BRANCH"
          gh pr create \
            --title "Add BLEnder config" \
            --body "$(cat <<'EOF'
          Generated by [BLEnder](https://github.com/mozilla/blender) setup.

          Review the prompt template and config, then merge.

          ## Files added

          - `.blender/blender.yml` — repo-specific settings
          - `.blender/fix-dependabot-prompt.md` — prompt template with fix patterns
          EOF
          )"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
