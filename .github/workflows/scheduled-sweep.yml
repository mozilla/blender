---
name: BLEnder Scheduled Sweep
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (true = discover only, no triggers)'
        default: 'false'

permissions:
  contents: read
  actions: write

concurrency:
  group: blender-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v6

      - name: Install Python dependencies
        run: |
          uv sync
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run sweep
        id: sweep
        run: python scripts/sweep.py
        env:
          BLENDER_APP_ID: ${{ secrets.BLENDER_APP_ID }}
          BLENDER_APP_PRIVATE_KEY: ${{ secrets.BLENDER_APP_PRIVATE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Trigger workflows
        if: inputs.dry_run != 'true'
        run: python scripts/trigger-workflows.py
        env:
          SWEEP_ACTIONS: ${{ steps.sweep.outputs.actions }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
